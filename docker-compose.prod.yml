# Production compose for Alibaba Cloud — Option B (managed DB + Redis).
#
# DB and Redis are NOT containers here: point them at ApsaraDB RDS for
# PostgreSQL (with the PostGIS extension enabled) and ApsaraDB for Redis (Tair)
# via the .env file. This file runs only the app tiers: web (daphne), the Huey
# worker, and nginx (TLS termination + websocket proxy).
#
# Usage on the ECS box:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Or pull prebuilt images from ACR by replacing `build:` with `image:`.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"        # internal only; nginx is the public entrypoint
    # pre_run.sh runs collectstatic + migrate, then the CMD (daphne) starts.

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - web

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro                 # served directly by nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro    # certs from certbot on the host

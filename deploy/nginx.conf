# nginx reverse proxy for the Daphne (ASGI) app.
# Terminates TLS and upgrades websockets (Django Channels needs the upgrade).
# Replace YOUR_DOMAIN before use. Get certs on the ECS host with:
#   sudo certbot certonly --standalone -d YOUR_DOMAIN

upstream foodie_web {
    server web:8000;
}

# HTTP -> HTTPS redirect (also serves the ACME challenge during cert issuance)
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    client_max_body_size 20M;   # allow image uploads

    # Static files served directly by nginx (collectstatic output)
    location /static/ {
        alias /app/static/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://foodie_web;
        proxy_http_version 1.1;

        # Websocket upgrade (Channels / daphne)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }
}

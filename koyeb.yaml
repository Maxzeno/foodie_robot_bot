# Koyeb deployment configuration
# Deploy two services: web (API) and worker (Huey scheduler)
#
# Usage:
# 1. Push your code to GitHub
# 2. Create two services in Koyeb dashboard:
#    - Web service: uses Dockerfile (default)
#    - Worker service: uses Dockerfile.worker
# 3. Both services need the same environment variables including REDIS_URL
#
# Required Environment Variables:
# - REDIS_URL: Your Redis connection URL (e.g., from Upstash, Redis Cloud, etc.)
# - All other env vars from your .env file

# Web Service Configuration
web:
  name: foodie-robot-web
  type: web
  dockerfile: Dockerfile
  ports:
    - port: 8000
      protocol: http
  health_checks:
    - port: 8000
      path: /
      protocol: http
  scaling:
    min: 1
    max: 1

# Worker Service Configuration
worker:
  name: foodie-robot-worker
  type: worker
  dockerfile: Dockerfile.worker
  scaling:
    min: 1
    max: 1
